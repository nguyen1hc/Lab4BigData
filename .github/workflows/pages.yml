name: Publish Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # GitHub project Pages is served from /<repository-name>/, not domain root.
  BASE_URL: /${{ github.event.repository.name }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Jupyter Book
        run: python -m pip install "jupyter-book>=2,<3"
      - name: Build site
        run: jupyter-book build --html --strict
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
