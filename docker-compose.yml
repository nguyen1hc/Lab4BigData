name: lab04-cpg-streaming

services:
  broker:
    image: confluentinc/cp-kafka:7.8.0
    hostname: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server broker:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 1400M

  kafka-init:
    image: confluentinc/cp-kafka:7.8.0
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
    volumes:
      - ./infra/kafka/create-topics.sh:/opt/lab04/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/opt/lab04/create-topics.sh"]
    restart: "no"

  neo4j:
    image: neo4j:5.26.28-community
    hostname: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Copy .env.example to .env and set NEO4J_PASSWORD}
      LAB04_NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Copy .env.example to .env and set NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 768m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$$LAB04_NEO4J_PASSWORD\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1500M

  neo4j-init:
    image: neo4j:5.26.28-community
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      LAB04_NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Copy .env.example to .env and set NEO4J_PASSWORD}
    volumes:
      - ./infra/neo4j/init.cypher:/opt/lab04/init.cypher:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - cypher-shell -a bolt://neo4j:7687 -u neo4j -p "$$LAB04_NEO4J_PASSWORD" -f /opt/lab04/init.cypher
    restart: "no"

  mongo:
    image: mongo:8.0
    hostname: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  connect:
    build:
      context: ./infra/connect
      args:
        NEO4J_CONNECTOR_VERSION: 5.5.0
    hostname: connect
    ports:
      - "8083:8083"
    depends_on:
      broker:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      CONNECT_BOOTSTRAP_SERVERS: broker:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: lab04-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: lab04-connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_TOPIC: lab04-connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_TOPIC: lab04-connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      LAB04_NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Copy .env.example to .env and set NEO4J_PASSWORD}
      CONNECT_LOG4J_ROOT_LOGLEVEL: WARN
      CONNECT_LOG4J_LOGGERS: org.reflections=ERROR,org.apache.kafka.connect.runtime.rest=WARN
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 5000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connector-plugins >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 24
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1400M

  connect-init:
    image: curlimages/curl:8.11.1
    depends_on:
      connect:
        condition: service_healthy
      neo4j-init:
        condition: service_completed_successfully
    environment:
      CONNECT_URL: http://connect:8083
    volumes:
      - ./infra/connect:/config:ro
    entrypoint: ["/bin/sh", "/config/register-wait.sh"]
    restart: "no"

  spark-metadata:
    image: apache/spark:3.5.7-scala2.12-java17-python3-ubuntu
    user: "0:0"
    depends_on:
      broker:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-lab04}
      MONGODB_COLLECTION: ${MONGODB_COLLECTION:-source_metadata}
      CHECKPOINT_DIR: /opt/checkpoints/source-metadata-v1
      HOME: /tmp
    volumes:
      - ./spark_jobs:/opt/app/spark_jobs:ro
      - spark-checkpoints:/opt/checkpoints
      - spark-ivy:/tmp/.ivy2
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        /opt/spark/bin/spark-submit
        --master local[2]
        --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.7,org.mongodb.spark:mongo-spark-connector_2.12:10.7.0
        --conf spark.jars.ivy=/tmp/.ivy2
        /opt/app/spark_jobs/metadata_to_mongo.py
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2500M

volumes:
  kafka-data:
  neo4j-data:
  neo4j-logs:
  mongo-data:
  spark-checkpoints:
  spark-ivy:
